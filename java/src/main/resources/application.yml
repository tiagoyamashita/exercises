spring:
  application:
    name: demo
  # Default: in-memory H2 (no PostgreSQL required). Use profile "postgres" when ready.
  datasource:
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

app:
  project:
    # Optional: absolute path to the directory that contains pom.xml (otherwise auto-detected).
    module-dir: ""
  # Outbound GET targets from the test dashboard ("generate traffic" buttons). Override per environment.
  stack:
    rust-base-url: http://127.0.0.1:8082
    python-base-url: http://127.0.0.1:5000
    prometheus-base-url: http://127.0.0.1:9090

---
# Optional: spring.profiles.active=postgres
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:demo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
