# Hot-reload dev overlay — use with the main compose file:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build java python rust
#
# Java: spring-boot:run (restarts on classpath changes; templates/static often need a manual refresh).
# Python: FLASK_DEBUG=1 reloader when source under ./python changes.
# Rust: cargo-watch rebuilds on src/ and templates/ changes (first start compiles; can take a few minutes).
services:
  java:
    build:
      context: ./java
      dockerfile: Dockerfile
      args:
        SKIP_TESTS: "true"
    entrypoint: []
    volumes:
      - ./java:/workspace
      - maven-cache:/root/.m2
    command: ["./mvnw", "spring-boot:run", "-Dspring-boot.run.jvmArguments=-Dserver.address=0.0.0.0"]

  python:
    build:
      context: ./python
      dockerfile: Dockerfile
    volumes:
      - ./python:/app
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"

  rust:
    build:
      context: ./rust
      dockerfile: Dockerfile.dev
    volumes:
      - ./rust:/app
      - rust-cargo-registry:/usr/local/cargo/registry
      - rust-target:/app/target
    environment:
      RUST_LOG: info
      EXERCISES_WEB_HOST: "0.0.0.0"
      EXERCISES_WEB_PORT: "8082"
      EXERCISES_RUST_ROOT: /app
      EXERCISES_JAVA_BASE_URL: http://localhost:8080

volumes:
  maven-cache:
  rust-cargo-registry:
  rust-target:
